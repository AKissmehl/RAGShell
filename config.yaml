llm:
  provider: llama_cpp
  model_path: models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
  context_window: 2048
  generation_params:
    max_tokens: 256
    temperature: 0.7
    top_p: 0.9
    echo: false
rag:
  embedding_model: all-MiniLM-L6-v2
  chunk_size: 512
  chunk_overlap: 50
  persist_directory: data/vector_db
  data_path: data/wiki_dump/
